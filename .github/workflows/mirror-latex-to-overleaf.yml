name: Mirror LaTeX To Overleaf Repo

on:
  push:
    branches:
      - main
    paths:
      - project1_linear_datadriven/Latex/**
      - Project2_LCS/Latex/**
      - .github/workflows/mirror-latex-to-overleaf.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror-latex:
    runs-on: ubuntu-latest
    env:
      PROJECT1_SOURCE: project1_linear_datadriven/Latex
      PROJECT2_SOURCE: Project2_LCS/Latex
      TARGET_BRANCH: ${{ vars.OVERLEAF_MIRROR_BRANCH || 'main' }}
      TARGET_REPO: ${{ vars.OVERLEAF_MIRROR_REPO }}
      PUSH_TOKEN: ${{ secrets.OVERLEAF_MIRROR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate mirror configuration
        run: |
          if [ -z "$TARGET_REPO" ]; then
            echo "Missing repository variable OVERLEAF_MIRROR_REPO." >&2
            echo "Set it to something like Behnamkmmajd/paper-overleaf." >&2
            exit 1
          fi

          if [ -z "$PUSH_TOKEN" ]; then
            echo "Missing secret OVERLEAF_MIRROR_TOKEN." >&2
            echo "Create a fine-grained PAT with Contents: Read and write on the target repo." >&2
            exit 1
          fi

          if [ ! -d "$PROJECT1_SOURCE" ]; then
            echo "Source folder '$PROJECT1_SOURCE' does not exist in this checkout." >&2
            exit 1
          fi

          if [ ! -d "$PROJECT2_SOURCE" ]; then
            echo "Source folder '$PROJECT2_SOURCE' does not exist in this checkout." >&2
            exit 1
          fi

      - name: Validate access to mirror repository
        run: |
          if ! git ls-remote "https://x-access-token:${PUSH_TOKEN}@github.com/${TARGET_REPO}.git" >/dev/null 2>&1; then
            echo "Cannot access target repository '${TARGET_REPO}'." >&2
            echo "Check that OVERLEAF_MIRROR_REPO is correct and OVERLEAF_MIRROR_TOKEN has Contents read/write on that repo." >&2
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build export repository
        run: |
          rm -rf overleaf-export
          mkdir -p overleaf-export/Project1 overleaf-export/Project2

          rsync -a --delete "$PROJECT1_SOURCE/" overleaf-export/Project1/
          rsync -a --delete "$PROJECT2_SOURCE/" overleaf-export/Project2/

          cd overleaf-export
          git init
          git checkout -b "$TARGET_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Mirror LaTeX projects from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"

      - name: Push export to mirror repository
        run: |
          cd overleaf-export
          git push --force \
            "https://x-access-token:${PUSH_TOKEN}@github.com/${TARGET_REPO}.git" \
            "${TARGET_BRANCH}:refs/heads/${TARGET_BRANCH}"